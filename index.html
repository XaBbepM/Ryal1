<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #e8f6f3;
            color: #1f423d;
            min-height: 100vh;
        }
        .page {
            display: grid;
            grid-template-rows: 120px 1fr 100px;
            min-height: 100vh;
            gap: 12px;
        }
        .top-bar,
        .bottom-bar {
            width: 100%;
            border: 0;
            display: block;
        }
        .top-bar {
            height: 120px;
        }
        .bottom-bar {
            height: 100px;
        }
        .content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 12px;
            min-height: 0;
            padding: 0 12px;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }
        .sidebar,
        .main-frame {
            min-height: 0;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(0,0,0,.08);
            background: white;
        }
        .sidebar {
            width: 320px;
        }
        .sidebar iframe,
        .main-frame iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
        #menuToggle {
            position: fixed;
            right: 18px;
            top: 132px;
            z-index: 20;
            border: none;
            background: #2d7a6e;
            color: white;
            padding: 14px 18px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 18px 32px rgba(0,0,0,.18);
            display: none;
        }
        #menuOverlay {
            position: fixed;
            top: 120px;
            right: 18px;
            width: 320px;
            max-height: calc(100vh - 160px);
            background: rgba(255,255,255,.98);
            border-radius: 24px;
            box-shadow: 0 26px 50px rgba(0,0,0,.18);
            border: 1px solid rgba(45,122,110,.18);
            overflow: hidden;
            z-index: 15;
            transform: translateX(110%);
            transition: transform .24s ease;
            display: none;
        }
        #menuOverlay.open {
            transform: translateX(0);
        }
        #menuOverlay iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        #menuClose {
            position: absolute;
            top: 14px;
            right: 14px;
            border: none;
            background: #2d7a6e;
            color: white;
            padding: 10px 12px;
            border-radius: 999px;
            cursor: pointer;
            z-index: 10;
            font-weight: 700;
            box-shadow: 0 12px 24px rgba(0,0,0,.15);
        }
        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
                padding: 0 12px;
            }
            .sidebar {
                display: none;
            }
            .main-frame {
                min-height: calc(100vh - 260px);
            }
            #menuToggle {
                display: block;
                top: 136px;
                right: 14px;
                padding: 12px 16px;
            }
            #menuOverlay {
                display: block;
                width: min(92vw, 380px);
                top: 136px;
                right: 14px;
                max-height: calc(100vh - 172px);
            }
        }
        @media (max-width: 700px) {
            .top-bar {
                height: 100px;
            }
            #menuToggle {
                top: 108px;
                right: 14px;
            }
            #menuOverlay {
                top: 108px;
                width: 100vw;
                right: 0;
                border-radius: 0 0 24px 24px;
                max-height: calc(100vh - 108px);
            }
            .main-frame {
                min-height: calc(100vh - 240px);
            }
        }
        @media (max-width: 500px) {
            .main-frame {
                min-height: calc(100vh - 220px);
            }
            #menuToggle {
                right: 10px;
                top: 104px;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <iframe src="header.html" title="Cabecera" class="top-bar"></iframe>
    <button id="menuToggle" type="button">Abrir menú</button>
    <div class="content">
        <div class="sidebar">
            <iframe src="leftframe.html" title="Menú" name="menuFrame"></iframe>
        </div>
        <div class="main-frame">
            <iframe src="inicio.html" title="Contenido principal" name="mainFrame"></iframe>
        </div>
    </div>
    <iframe src="footer.html" title="Pie de página" class="bottom-bar"></iframe>
    <div id="menuOverlay">
        <button id="menuClose" type="button">Cerrar</button>
        <iframe src="leftframe.html" title="Menú" name="menuFrame"></iframe>
    </div>
</div>
<script>
const menuToggle = document.getElementById('menuToggle');
const menuOverlay = document.getElementById('menuOverlay');
const menuClose = document.getElementById('menuClose');

menuToggle.addEventListener('click', () => {
    menuOverlay.classList.toggle('open');
    menuToggle.textContent = menuOverlay.classList.contains('open') ? 'Cerrar menú' : 'Abrir menú';
});
menuClose.addEventListener('click', () => {
    menuOverlay.classList.remove('open');
    menuToggle.textContent = 'Abrir menú';
});
</script>
</body>
</html>
