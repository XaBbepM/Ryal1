<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        frameset { display: flex; flex-direction: column; }
        frame { display: block; }
    </style>
</head>
<frameset rows="120,*,100" frameborder="1" border="2">

    <frame src="header.html" name="headerFrame" noresize scrolling="no">
    
    <frameset cols="25%,*" frameborder="1" border="2">
        <frame src="leftframe.html" name="menuFrame">
        <frame src="inicio.html" name="mainFrame">
    </frameset>

    <frame src="footer.html" name="footerFrame" noresize scrolling="no">
</frameset>
</html>
