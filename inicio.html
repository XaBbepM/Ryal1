<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #e8f6f3;
            color: #1f423d;
        }
        .content {
            max-width: 900px;
            margin: auto;
            text-align: center;
        }
        h1 {
            margin-bottom: 18px;
            font-size: 2rem;
        }
        .video-box {
            margin: auto;
            max-width: 700px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,.12);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        p {
            margin-top: 16px;
            line-height: 1.7;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>¡Bienvenido!</h1>
        <div class="video-box">
            <video controls autoplay muted playsinline>
                <source src="videos/Prevención.mp4" type="video/mp4">
                Tu navegador no soporta el elemento de video.
            </video>
        </div>
        <p>Selecciona un enlace del menú para ver el contenido o reproducir cualquiera de los videos.</p>
        <p>En móviles, usa el botón "Mostrar menú" para abrir y cerrar la navegación sin ocupar toda la pantalla.</p>
    </div>
</body>
</html>
